  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

  <style>
    body {
      height: 100vh;
      margin: 0;

      background: linear-gradient(
        to bottom,
        #4d736f 0%,
        #4d736f 75%,
        #d9843b 110%
      );
    }

    h1 {
      font-family:
        "Gill Sans", "Gill Sans MT", Calibri, "Trebuchet MS", sans-serif;
      text-align: center;
    }

    .caja {
      background: transparent;
      padding: 20px;
      border-radius: 10px;
      transition: transform 0.3s ease;
    }

    .caja:hover {
      transform: scale(1.05);
    }

    h2 {
      font-family:
        "Gill Sans", "Gill Sans MT", Calibri, "Trebuchet MS", sans-serif;
      text-align: center;
      margin-top: 20px;
      color: #ffffff;
    }

    .list {
      font-family:
        "Gill Sans", "Gill Sans MT", Calibri, "Trebuchet MS", sans-serif;
      text-align: center;
      font-size: 30px;
      color: rgb(104, 58, 58);
      justify-content: center;
      list-style: none;
      display: flex;
      gap: 40px;
    }

    .list a {
      text-decoration: none;
      color: #590202;
    }

    .list a:hover {
      color: #d9843b;
    }

    .subrayado {
      text-decoration: underline;
      text-underline-offset: -5px;
      text-underline-position: under;
      text-decoration-color: #d9843b;
      text-decoration-thickness: 6px;
      margin-top: 20px;
    }

    div {
      font-family:
        "Gill Sans", "Gill Sans MT", Calibri, "Trebuchet MS", sans-serif;
      text-align: center;
      font-size: 60px;
      color: rgb(255, 255, 255);
      cursor: pointer;
    }

    table {
        width: 100% ;
        background-color: #590202;
        margin-top: 20px;
        font-size: 15px;
        border: #d9843b 2px solid;
        border-collapse: collapse;
        width: 100%;
    }

    
  </style>

  <body>
    <header>
      <h1 class="subrayado">
        <div class="caja">sabor Del Mar</div>
      </h1>
    </header>

      El menu disponible en nuestra pagina con una breve descripcion del plato.

        <li><a href="Principal.html">Principal</a></li>
        <li><a href="Menu.html">Menu</a></li>
        <li><a href="Contacto.html">Contacto</a></li>
      </ul>
    </nav>

    <footer></footer>
  </body>
</html>
